services:
  novelist:
    name: novelist
    image: your-image  # 构建后替换
    ports:
      - port: 5001
        targetPort: 5001
        protocol: http
    env:
      FLASK_ENV: production
    mounts:
      - mountPath: /app/instance
        name: novelist-data
    resources:
      cpu: 200m
      memory: 256Mi
